    <!--
      Google Fonts — preconnect first (parallel DNS+TLS), then load as stylesheet.
      This is NON-BLOCKING unlike @import in CSS which freezes the entire stylesheet.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "RezaKit",
      "alternateName": ["Tracker Musculation", "App Muscu Gratuite"],
      "operatingSystem": "iOS, Android, Web",
      "applicationCategory": "HealthApplication",
      "applicationSubCategory": "FitnessApplication",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
      "description": "Application de musculation gratuite avec coach IA. Suivez vos séances, mesurez vos progrès, planifiez vos entraînements.",
      "url": "https://resakit.fr",

      "inLanguage": ["fr", "en", "es"],
      "author": { "@type": "Organization", "name": "RezaKit", "url": "https://resakit.fr" }
    }

    <title>RezaKit — Tracker Musculation avec Coach IA</title>

    <!--
      Inline critical CSS + splash screen visible BEFORE any JS loads.
      React replaces #root content on mount — this splash never flashes once app is ready.
    -->
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      html,body{height:100%;background:#050505;overflow:hidden}
      #root{position:fixed;inset:0;background:#050505;overflow:hidden}
      #splash{
        position:fixed;inset:0;
        background:radial-gradient(ellipse at 30% 20%,rgba(255,107,53,.18) 0,transparent 55%),
                   radial-gradient(ellipse at 80% 80%,rgba(196,30,58,.12) 0,transparent 50%),
                   #050505;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        z-index:9999;transition:opacity .35s ease;padding:20px;text-align:center;
      }
      #splash-logo{
        font-family:Impact,Arial,sans-serif;font-size:64px;letter-spacing:4px;
        color:#FF6B35;line-height:1;margin-bottom:6px;
        text-shadow:0 0 60px rgba(255,107,53,.5);
      }
      #splash-sub{font-size:13px;color:rgba(255,255,255,.28);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:48px;font-family:Arial,sans-serif}
      #splash-ring{width:36px;height:36px;position:relative}
      #splash-ring::before{content:'';position:absolute;inset:0;border-radius:50%;border:2.5px solid rgba(255,107,53,.18)}
      #splash-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:2.5px solid transparent;border-top-color:#FF6B35;animation:rzk-spin .8s linear infinite}
      @keyframes rzk-spin{to{transform:rotate(360deg)}}
      #boot-fail{display:none;max-width:380px;margin-top:32px;padding:18px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#bdbdc4;font-family:-apple-system,Arial,sans-serif;font-size:13px;line-height:1.55}
      #boot-fail b{color:#fff;display:block;margin-bottom:6px;font-size:14px}
      #boot-fail button{margin-top:12px;background:#FF6B35;border:none;color:#fff;padding:11px 22px;border-radius:999px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
      #boot-fail button + button{margin-left:8px;background:rgba(255,255,255,0.08)}
    </style>
  </head>
  <body>
    <!-- Visible immediately — no JS required -->
    <div id="splash">
      <div id="splash-logo">RezaKit</div>
      <div id="splash-sub">Fitness · Coach IA</div>
      <div id="splash-ring"></div>
      <div id="boot-fail">
        <b id="boot-fail-title">L'app met du temps à démarrer</b>
        <div id="boot-fail-msg">Connexion lente ou cache corrompu. Tu peux nettoyer et réessayer.</div>
        <pre id="boot-fail-err" style="display:none;margin-top:10px;padding:10px;background:#000;border:1px solid rgba(255,107,53,0.3);border-radius:8px;color:#FF6B35;font-size:11px;font-family:ui-monospace,monospace;text-align:left;white-space:pre-wrap;word-break:break-all;max-height:160px;overflow:auto"></pre>
        <div>
          <button onclick="window.location.reload()">Recharger</button>
          <button onclick="(async()=>{try{const r=await navigator.serviceWorker.getRegistrations();for(const x of r)await x.unregister();const k=await caches.keys();await Promise.all(k.map(n=>caches.delete(n)));}catch(e){}localStorage.clear();sessionStorage.clear();window.location.reload();})()">Vider cache</button>
        </div>
      </div>
    </div>

    <!-- Boot watchdog + global error capture: surface the REAL error so we can fix it -->
    <script>
      window.__bootStart = Date.now();
      window.__bootErrors = [];
      function showBootFail(title, errStr){
        try {
          var s = document.getElementById('splash');
          var f = document.getElementById('boot-fail');
          var t = document.getElementById('boot-fail-title');
          var ePre = document.getElementById('boot-fail-err');
          var ring = document.getElementById('splash-ring');
          if (!s || !f) return;
          if (ring) ring.style.display = 'none';
          if (title && t) t.textContent = title;
          if (errStr && ePre) { ePre.style.display = 'block'; ePre.textContent = errStr; }
          f.style.display = 'block';
        } catch(e) {}
      }
      window.addEventListener('error', function(ev){
        var msg = (ev.message || 'unknown error') + '\n@ ' + (ev.filename || '?') + ':' + (ev.lineno || '?') + ':' + (ev.colno || '?');
        if (ev.error && ev.error.stack) msg += '\n' + ev.error.stack.split('\n').slice(0,4).join('\n');
        window.__bootErrors.push(msg);
        // If error fires before React mounts, surface it immediately
        if (window.__bootWatchdog) showBootFail('Erreur au démarrage', window.__bootErrors.join('\n---\n'));
      });
      window.addEventListener('unhandledrejection', function(ev){
        var r = ev.reason;
        var msg = 'Unhandled rejection: ' + (r && r.message ? r.message : String(r));
        if (r && r.stack) msg += '\n' + r.stack.split('\n').slice(0,4).join('\n');
        window.__bootErrors.push(msg);
        if (window.__bootWatchdog) showBootFail('Erreur au démarrage', window.__bootErrors.join('\n---\n'));
      });
      window.__bootWatchdog = setTimeout(function(){
        var s = document.getElementById('splash');
        if (s && s.style.opacity !== '0') {
          var errs = window.__bootErrors.length ? window.__bootErrors.join('\n---\n') : null;
          showBootFail(errs ? 'Erreur au démarrage' : "L'app met du temps à démarrer", errs);
        }
      }, 10000);
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
